<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Generador de Contraseñas</title>
</head>

<body>
    <h1>Generador de Contraseñas</h1>

    <div class="contenedor">

        <label>Longitud:</label>
        <input type="number" id="length" min="4" max="50" value="12">

        <label><input type="checkbox" id="mayus" checked>Incluir mayúsculas</label>
        <label><input type="checkbox" id="minus" checked>Incluir minúsculas</label>
        <label><input type="checkbox" id="numeros" checked>Incluir números</label>
        <label><input type="checkbox" id="simbolos">Incluir símbolos</label>


        <button id="generateBtn">Generar Contraseña</button>

        <!-- Mostrar la contraseña generada -->
        <h2>Contraseña:</h2>
        <div id="output"></div>
        
<!-- Botón para copiar la contraseña -->
        <button id="copiarBtn">Copiar</button>

<!-- Barra de fortaleza de la contraseña -->
        <h3>Fortaleza:</h3>
        <div id="barra-fuerza">
            <div id="barra-interna"></div>
        </div>
        <p id="texto-fuerza">-</p>

<!-- Historial de contraseñas generadas -->
        <h2>Historial</h2>
        <div id="historial"></div>
        <button id="borrarHistorialBtn">Borrar Historial</button>
    </div>
</body>
<script src="script.js"></script>

</html>
